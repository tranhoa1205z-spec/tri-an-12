<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thẻ Bài 3D Tách Lớp & Phản Quang</title>
  <style>
    /* ==========================================================================
       1. CẤU HÌNH GIAO DIỆN CHUNG (CSS)
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 100vw;
      height: 100vh;
      background-color: #0b0f19; /* Nền tối để làm nổi bật dải phản quang */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      perspective: 1200px; /* Tạo độ sâu trường ảnh cho không gian 3D */
    }

    /* Nút bấm kích hoạt cảm biến Gyro trên điện thoại */
    #btn-permission {
      padding: 14px 28px;
      font-size: 16px;
      font-weight: bold;
      background: linear-gradient(45deg, #00f2fe, #4facfe);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
      z-index: 10;
      transition: transform 0.2s;
    }
    #btn-permission:active {
      transform: scale(0.95);
    }

    /* Khung định hình kích thước cho tấm thẻ bài */
    .card-container {
      width: 300px;
      height: 450px;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    /* TẤM CARD CHÍNH - CHỨA ẢNH NỀN (NỀN GIỮ NGUYÊN) */
    .card {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      position: relative;
      
      /* 🔴 CHÚ Ý: THAY TÊN FILE ẢNH NỀN CỦA BẠN Ở ĐÂY */
      background-image: url('https://i.pinimg.com/736x/07/1f/de/071fde04db97e63f2c6115a1ad717805.jpg'); 
      
      background-size: cover;
      background-position: center;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
      transform-style: preserve-3d;
      overflow: hidden;
    }

    /* LỚP VẬT THỂ / NHÂN VẬT (DI CHUYỂN NỔI LÊN) */
    .card-character {
      position: absolute;
      inset: 0;
      
      /* 🔴 CHÚ Ý: THAY TÊN FILE ẢNH NHÂN VẬT ĐÃ TÁCH NỀN Ở ĐÂY (.PNG) */
      background-image: url('https://i.pinimg.com/736x/19/33/12/193312d6f34d79be506a144567ba8fb9.jpg'); 
      
      background-size: cover;
      background-position: center;
      pointer-events: none;
      z-index: 2;
      
      /* Đẩy nổi vật thể lên 60px theo trục Z và phóng to nhẹ để tránh lộ viền */
      transform: translateZ(60px) scale(1.05); 
      transition: transform 0.1s ease-out;
    }

    /* LỚP PHỦ PHẢN QUANG CẦU VỒNG (HOLOGRAM FOIL EFFECT) */
    .card-foil {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      pointer-events: none;
      z-index: 3; /* Nằm trên cùng đè lên cả vật thể */
      
      /* Tạo dải màu gradient mô phỏng ánh màng bạc cầu vồng */
      background: linear-gradient(
        var(--foil-angle, 115deg),
        rgba(255, 0, 128, 0.2) 0%,
        rgba(0, 242, 254, 0.25) 30%,
        rgba(255, 255, 255, 0.65) 50%,
        rgba(127, 0, 255, 0.25) 70%,
        rgba(255, 0, 128, 0.2) 100
      );
      background-size: 200% 200%;
      /* Vị trí tâm luồng sáng được JS cập nhật động theo góc nghiêng */
      background-position: var(--foil-x, 50%) var(--foil-y, 50%); 
      
      /* Chế độ hòa trộn giúp phản quang bắt sáng rực lên dựa vào màu ảnh dưới */
      mix-blend-mode: color-dodge; 
      opacity: 0.8;
      transition: background-position 0.1s ease-out;
    }

    /* Lớp lót tối để tạo độ sâu và tăng độ tương phản ánh sáng */
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.08);
      z-index: 1;
    }
  </style>
</head>
<body>

  <button id="btn-permission">Bật hiệu ứng nghiêng 3D & Phản quang</button>

  <div class="card-container" id="cardContainer">
    <div class="card" id="card">
      <div class="card-character"></div>
      <div class="card-foil" id="cardFoil"></div>
    </div>
  </div>

  <script>
    /* ==========================================================================
       2. ĐIỀU KHIỂN LOGIC CHUYỂN ĐỘNG VÀ ÁNH SÁNG (JAVASCRIPT)
       ========================================================================== */
    const cardContainer = document.getElementById('cardContainer');
    const cardFoil = document.getElementById('cardFoil');
    const btnPermission = document.getElementById('btn-permission');

    // Hàm cập nhật đồng thời góc nghiêng 3D và tọa độ dải phản quang
    function updateCardEffects(xDeg, yDeg) {
      // Nghiêng toàn bộ khung thẻ theo trục X và Y
      cardContainer.style.transform = `rotateX(${xDeg}deg) rotateY(${yDeg}deg)`;

      // Tính toán dịch chuyển dải sáng ngược hướng nghiêng để tạo cảm giác phản chiếu vật lý
      const foilX = 50 + (yDeg * 2.2);
      const foilY = 50 - (xDeg * 2.2);
      const foilAngle = 115 + (yDeg * 2);

      // Gán giá trị tính toán trực tiếp vào các biến cấu hình CSS
      cardFoil.style.setProperty('--foil-x', `${foilX}%`);
      cardFoil.style.setProperty('--foil-y', `${foilY}%`);
      cardFoil.style.setProperty('--foil-angle', `${foilAngle}deg`);
    }

    // --- XỬ LÝ SỰ KIỆN TRÊN MÁY TÍNH (PC - DI CHUỘT) ---
    document.addEventListener('mousemove', (e) => {
      if (window.innerWidth > 768) { // Chỉ chạy trên màn hình lớn (PC)
        const xAxis = (window.innerWidth / 2 - e.pageX) / 12; // Biên độ xoay Y
        const yAxis = (window.innerHeight / 2 - e.pageY) / 12; // Biên độ xoay X
        updateCardEffects(-yAxis, xAxis);
      }
    });

    // Trả thẻ về vị trí cân bằng phẳng lặng khi chuột rời màn hình
    document.addEventListener('mouseleave', () => {
      if (window.innerWidth > 768) {
        cardContainer.style.transform = `rotateY(0deg) rotateX(0deg)`;
        cardFoil.style.setProperty('--foil-x', '50%');
        cardFoil.style.setProperty('--foil-y', '50%');
        cardFoil.style.setProperty('--foil-angle', '115deg');
      }
    });

    // --- XỬ LÝ CẢM BIẾN TRÊN ĐIỆN THOẠI (MOBILE - NGHIÊNG MÁY) ---
    function handleOrientation(event) {
      let beta = event.beta;   // Góc tiến/lùi (-180 đến 180)
      let gamma = event.gamma; // Góc trái/phải (-90 đến 90)

      // Giới hạn góc nghiêng tối đa ±25 độ dựa trên góc cầm máy 45 độ tự nhiên
      let tiltX = Math.min(Math.max(beta - 45, -25), 25); 
      let tiltY = Math.min(Math.max(gamma, -25), 25);

      updateCardEffects(-tiltX, tiltY);
    }

    // Hàm xin cấp quyền cảm biến phần cứng (Bắt buộc cho iOS 13+ và Android bảo mật cao)
    function requestGyroPermission() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        // Thiết bị hệ điều hành iOS (iPhone)
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation);
              btnPermission.style.display = 'none'; // Ẩn nút sau khi thành công
            } else {
              alert('Cần quyền con quay hồi chuyển để trải nghiệm hiệu ứng phản quang!');
            }
          })
          .catch(console.error);
      } else {
        // Thiết bị hệ điều hành Android và các trình duyệt không chặn quyền mặc định
        window.addEventListener('deviceorientation', handleOrientation);
        btnPermission.style.display = 'none';
      }
    }

    // Kích hoạt hàm xin quyền khi người dùng click/chạm nút
    btnPermission.addEventListener('click', requestGyroPermission);
  </script>
</body>
</html>
