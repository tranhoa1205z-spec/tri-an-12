<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thẻ Bài 3D Tách Lớp & Lật Mặt</title>
  <style>
    /* ==========================================================================
       1. CẤU HÌNH GIAO DIỆN CHUNG
       ========================================================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 100vw; height: 100vh; background-color: #05070f;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      overflow: hidden; font-family: system-ui, -apple-system, sans-serif; perspective: 1500px;
    }

    #btn-permission {
      padding: 13px 25px; font-size: 15px; font-weight: bold;
      background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white;
      border: none; border-radius: 30px; cursor: pointer; margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4); z-index: 10;
    }

    /* KHUNG XOAY CHÍNH CỦA THẺ BÀI */
    .card-container {
      width: 320px; height: 470px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Khi kích hoạt click, toàn bộ thẻ lật 180 độ */
    .card-container.flipped {
      transform: rotateY(180deg) !important;
    }

    /* ĐỊNH DẠNG HAI MẶT TRƯỚC VÀ SAU */
    .card-front, .card-back {
      position: absolute; inset: 0;
      border-radius: 20px;
      backface-visibility: hidden; /* Giúp ẩn mặt này khi mặt kia lật ra */
      transform-style: preserve-3d;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* ==========================================================================
       2. CHI TIẾT MẶT TRƯỚC (FRONT) - TÁCH BIỆT NỀN VÀ VẬT THỂ
       ========================================================================== */
    .card-front {
      /* 🔴 1. ĐƯỜNG LINK ẢNH NỀN CỦA BẠN (GIỮ NGUYÊN) */
      background-image: url('nen.jpg'); 
      background-size: cover; background-position: center;
      overflow: hidden;
    }

    /* 🔴 2. LỚP VẬT THỂ / NHÂN VẬT NỔI (.PNG TRONG SUỐT) */
    .card-character {
      position: absolute; inset: 0;
      /* 🔴 ĐƯỜNG LINK ẢNH NHÂN VẬT ĐÃ TÁCH NỀN CỦA BẠN */
      background-image: url('nhanvat.png'); 
      background-size: cover; background-position: center; pointer-events: none; z-index: 2;
      
      /* Đẩy nổi vật thể lên hẳn 60px trong không gian 3D và phóng to nhẹ tránh lộ viền */
      transform: translateZ(60px) scale(1.05); 
      transition: transform 0.1s ease-out;
    }

    /* 🔴 3. LỚP PHỦ PHẢN QUANG CẦU VỒNG (HOLOGRAM) */
    .card-foil {
      position: absolute; inset: 0; border-radius: 20px; pointer-events: none; z-index: 3;
      background: linear-gradient(
        var(--foil-angle, 115deg), 
        rgba(255,0,128,0.15) 0%, 
        rgba(0,242,254,0.2) 30%, 
        rgba(255,255,255,0.65) 50%, 
        rgba(127,0,255,0.2) 70%, 
        rgba(255,0,128,0.15) 100%
      );
      background-size: 200% 200%; 
      background-position: var(--foil-x, 50%) var(--foil-y, 50%);
      mix-blend-mode: color-dodge; 
      opacity: 0.8;
      transition: background-position 0.1s ease-out;
    }

    /* Lớp lót tối nhẹ phía trên ảnh nền để tăng tương phản bắt sáng của lớp phản quang */
    .card-front::after {
      content: ""; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.05); z-index: 1;
    }

    /* ==========================================================================
       3. CHI TIẾT MẶT SAU (BACK) - GRADIENT ĐỎ ĐEN & VĂN BẢN
       ========================================================================== */
    .card-back {
      /* Hiệu ứng màu Gradient Đỏ - Đen quyền lực */
      background: linear-gradient(135deg, #260202 0%, #0d0101 50%, #000000 100%);
      transform: rotateY(180deg); /* Mặc định mặt sau sẽ úp lại */
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 30px; text-align: center; color: #f3f4f6;
      border: 2px solid #630404; /* Viền đỏ sẫm sang trọng */
    }

    /* Đèn giả lập tỏa sáng nhẹ từ tâm mặt sau */
    .card-back::before {
      content: ""; position: absolute; inset: 0; border-radius: 18px;
      background: radial-gradient(circle at center, rgba(255, 0, 0, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Phần văn bản đẩy khối 3D nổi hẳn lên khi lật ra */
    .card-content {
      z-index: 2;
      transform: translateZ(50px); 
    }

    .card-content h2 {
      font-size: 24px; color: #ff4b2b; margin-bottom: 15px; font-weight: 800;
      text-shadow: 0 2px 10px rgba(255, 75, 43, 0.4); letter-spacing: 1px;
    }

    .card-content p {
      font-size: 15px; line-height: 1.6; color: #cbd5e1; font-weight: 400;
    }
  </style>
</head>
<body>

  <button id="btn-permission">Bật hiệu ứng nghiêng 3D & Phản quang</button>

  <div class="card-container" id="cardContainer">
    
    <div class="card-front">
      <div class="card-character"></div>
      <div class="card-foil" id="cardFoil"></div>
    </div>

    <div class="card-back">
      <div class="card-content">
        <h2>TIÊU ĐỀ MẶT SAU</h2>
        <p>Đây là nội dung văn bản nằm ở mặt sau của tấm thẻ bài 3D tách lớp. Khi bạn nhấn vào mặt trước, tấm thẻ sẽ xoay lật mượt mà để hiển thị thông điệp này.</p>
      </div>
    </div>

  </div>

  <script>
    /* ==========================================================================
       4. ĐIỀU KHIỂN LOGIC XOAY 3D, DI CHUYỂN ÁNH SÁNG VÀ LẬT THẺ
       ========================================================================== */
    const cardContainer = document.getElementById('cardContainer');
    const cardFoil = document.getElementById('cardFoil');
    const btnPermission = document.getElementById('btn-permission');
    
    let isFlipped = false;

    // Hàm tính toán góc nghiêng đồng thời cho cả khung thẻ và dải phản quang
    function updateCardEffects(xDeg, yDeg) {
      if (isFlipped) return; // Nếu đang lật mặt sau văn bản thì dừng hiệu ứng mặt trước

      // Xoay khung thẻ bài ngoài không gian 3D
      cardContainer.style.transform = `rotateX(${xDeg}deg) rotateY(${yDeg}deg)`;
      
      // Di chuyển vệt sáng phản quang ngược hướng nghiêng để tạo cảm giác thực tế
      const foilX = 50 + (yDeg * 2.5);
      const foilY = 50 - (xDeg * 2.5);
      const foilAngle = 115 + (yDeg * 2);

      cardFoil.style.setProperty('--foil-x', `${foilX}%`);
      cardFoil.style.setProperty('--foil-y', `${foilY}%`);
      cardFoil.style.setProperty('--foil-angle', `${foilAngle}deg`);
    }

    // --- SỰ KIỆN CLICK LẬT MẶT THẺ ---
    cardContainer.addEventListener('click', () => {
      isFlipped = !isFlipped;
      if (isFlipped) {
        cardContainer.classList.add('flipped');
      } else {
        cardContainer.classList.remove('flipped');
        cardContainer.style.transform = `rotateX(0deg) rotateY(0deg)`; // Reset về vị trí phẳng khi lật lại mặt trước
      }
    });

    // --- DI CHUỘT TRÊN MÁY TÍNH (PC) ---
    document.addEventListener('mousemove', (e) => {
      if (window.innerWidth > 768 && !isFlipped) {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 10;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 10;
        updateCardEffects(-yAxis, xAxis);
      }
    });

    // Trả thẻ về trạng thái phẳng lặng khi di chuột ra ngoài
    document.addEventListener('mouseleave', () => {
      if (window.innerWidth > 768 && !isFlipped) {
        cardContainer.style.transform = `rotateY(0deg) rotateX(0deg)`;
        cardFoil.style.setProperty('--foil-x', '50%');
        cardFoil.style.setProperty('--foil-y', '50%');
      }
    });

    // --- NGHIÊNG ĐIỆN THOẠI (MOBILE) ---
    function handleOrientation(event) {
      if (isFlipped) return;
      let beta = event.beta;   
      let gamma = event.gamma; 

      let tiltX = Math.min(Math.max(beta - 45, -22), 22); 
      let tiltY = Math.min(Math.max(gamma, -22), 22);

      updateCardEffects(-tiltX, tiltY);
    }

    // Xin quyền cảm biến phần cứng
    function requestGyroPermission() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => {
          if (state === 'granted') { 
            window.addEventListener('deviceorientation', handleOrientation); 
            btnPermission.style.display = 'none'; 
          }
        }).catch(console.error);
      } else { 
        window.addEventListener('deviceorientation', handleOrientation); 
        btnPermission.style.display = 'none'; 
      }
    }
    btnPermission.addEventListener('click', requestGyroPermission);
  </script>
</body>
</html>
