<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ 3D Gradient Đen Đỏ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px; /* Tạo không gian 3D cho body */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container giữ khoảng cách 3D */
        .card-container {
            width: 320px;
            height: 480px;
            cursor: pointer;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        /* Thẻ chính */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        0 0 50px rgba(255, 0, 0, 0.15);
        }

        /* Khi thẻ có class .flipped, lật 180 độ */
        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Mặt trước và mặt sau */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Giấu mặt còn lại khi lật */
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        /* MẶT TRƯỚC: Gradient Đen Đỏ */
        .card-front {
            background: linear-gradient(135deg, #141414 0%, #2c0000 50%, #800000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .card-front h2 {
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .card-front p {
            font-size: 0.9rem;
            color: #8c8c8c;
        }

        /* Vệt sáng (Glare effect) ở mặt trước */
        .glare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 60%);
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* MẶT SAU: Khi lật lại */
        .card-back {
            background: #1a1a1a;
            border: 2px solid #800000;
            transform: rotateY(180deg); /* Xoay sẵn mặt sau */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: #ececec;
            text-align: center;
        }

        .card-back h3 {
            color: #ff3333;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .card-back p {
            font-size: 1rem;
            line-height: 1.6;
        }
        
        /* Hướng dẫn cấp quyền trên iOS nếu cần */
        .btn-permission {
            position: absolute;
            bottom: 20px;
            background: #800000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="glare" id="glare"></div>
                <h2>PREMIUM</h2>
                <p>Chạm để xem nội dung</p>
            </div>
            <div class="card-face card-back">
                <h3>XIN CHÀO!</h3>
                <p>Đây là mặt sau của chiếc thẻ 3D. Bạn có thể thay đổi đoạn văn bản này bằng bất cứ nội dung nào bạn muốn hiển thị.</p>
            </div>
        </div>
    </div>

    <button class="btn-permission" id="permissionBtn">Bật cảm biến nghiêng</button>

    <script>
        const container = document.getElementById('cardContainer');
        const card = document.getElementById('card');
        const glare = document.getElementById('glare');
        const permissionBtn = document.getElementById('permissionBtn');

        let isFlipped = false;

        // 1. SỰ KIỆN CLICK/CHẠM ĐỂ LẬT THẺ
        container.addEventListener('click', () => {
            isFlipped = !isFlipped;
            if (isFlipped) {
                card.classList.add('flipped');
                // Trả thẻ về trạng thái phẳng khi đang xem mặt sau để dễ đọc chữ
                container.style.transform = `rotateX(0deg) rotateY(0deg)`;
                glare.style.opacity = 0;
            } else {
                card.classList.remove('flipped');
                glare.style.opacity = 1;
            }
        });

        // 2. HIỆU ỨNG DI CHUYỂN 3D VÀ VỆT SÁNG

        // Hàm xử lý xoay thẻ chung
        function updateRotation(xValue, yValue) {
            // Nếu thẻ đang lật mặt sau thì không nghiêng nữa để user đọc chữ
            if (isFlipped) return; 

            // Giới hạn góc nghiêng tối đa là 25 độ
            const rotateX = -yValue * 25; 
            const rotateY = xValue * 25;

            container.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

            // Di chuyển vệt sáng theo hướng ngược lại để tạo cảm giác thực tế
            const glareX = (xValue + 1) * 50; // Chuyển từ hệ -1->1 sang 0%->100%
            const glareY = (yValue + 1) * 50;
            glare.style.background = `radial-gradient(circle at ${glareX}% ${glareY}%, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 60%)`;
        }

        // Hướng 2A: Dành cho MÁY TÍNH (Dùng chuột)
        document.addEventListener('mousemove', (e) => {
            // Kiểm tra xem có phải thiết bị di động không, nếu có cảm biến thì ưu tiên cảm biến
            if (window.DeviceOrientationEvent && 'ontouchstart' in window) return;

            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // Tính toán vị trí chuột từ -1 đến 1 dựa trên tâm màn hình
            const xValue = (e.clientX - width / 2) / (width / 2);
            const yValue = (e.clientY - height / 2) / (height / 2);

            updateRotation(xValue, yValue);
        });

        // Trả thẻ về vị trí cũ khi chuột rời màn hình máy tính
        document.addEventListener('mouseleave', () => {
            if (!isFlipped) {
                container.style.transform = `rotateX(0deg) rotateY(0deg)`;
                glare.style.background = `radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 60%)`;
            }
        });

        // Hướng 2B: Dành cho ĐIỆN THOẠI (Dùng con quay hồi chuyển / Độ nghiêng)
        function handleOrientation(event) {
            //
