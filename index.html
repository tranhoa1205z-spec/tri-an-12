<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thẻ Bài 3D Tách Lớp Phức Tạp & Lật Mặt Tri Ân</title>
  <style>
    /* ==========================================================================
       1. CẤU HÌNH RESET & GIAO DIỆN CHUNG (CSS GLOBAL)
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      background-color: #05070f; /* Nền tối sâu để tôn dải phản quang color-dodge */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      perspective: 1500px; /* Độ sâu trường ảnh cho không gian xoay 3D */
    }

    /* Nút bấm kích hoạt cảm biến Gyroscope cho thiết bị di động */
    #btn-permission {
      padding: 13px 28px;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.5px;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      color: #ffffff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
      z-index: 10;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    #btn-permission:active {
      transform: scale(0.95);
    }

    /* ==========================================================================
       2. CẤU TRÚC ĐỊNH HÌNH KHUNG BAO THẺ BÀI (CARD LAYERS)
       ========================================================================== */
    .card-container {
      width: 320px;
      height: 470px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); /* Hiệu ứng lật mượt mà */
    }

    /* Lớp trạng thái lật mặt sau khi người dùng click vào thẻ */
    .card-container.flipped {
      transform: rotateY(180deg) !important;
    }

    /* Cấu hình thuộc tính chung cho cả Mặt Trước và Mặt Sau */
    .card-front, .card-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      backface-visibility: hidden; /* Ẩn mặt đối diện khi đang lật mặt này */
      transform-style: preserve-3d;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* ==========================================================================
       3. CHI TIẾT MẶT TRƯỚC (FRONT) - HIỆU ỨNG TÁCH LỚP PHỨC TẠP
       ========================================================================== */
    .card-front {
      background-color: #111424;
      
      /* 🔴 LỚP 1: ẢNH NỀN PHÍA SAU (ĐỨNG YÊN) */
      /* Sửa 'nen.jpg' thành link ảnh nền của bạn nếu cần */
      background-image: url('nen.jpg'); 
      
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    /* 🔴 LỚP 2: NHÂN VẬT / VẬT THỂ NỔI KHỐI (DI CHUYỂN ĐỘC LẬP TRÊN TRỤC Z) */
    .card-character {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      
      /* 🔴 Sửa 'nhanvat.png' thành link ảnh nhân vật đã xóa nền (.png trong suốt) */
      background-image: url('nhanvat.png'); 
      
      background-size: cover;
      background-position: center;
      pointer-events: none;
      z-index: 2;
      
      /* Đẩy nhân vật nhô lên khỏi bề mặt nền 60px và phóng to 1.05 lần tránh lộ viền ảnh khi nghiêng */
      transform: translateZ(60px) scale(1.05); 
      transition: transform 0.1s ease-out;
    }

    /* 🔴 LỚP 3: MÀNG PHỦ PHẢN QUANG CẦU VỒNG (HOLOGRAM FOIL - CHẾ ĐỘ COLOR-DODGE) */
    .card-foil {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      pointer-events: none;
      z-index: 3; /* Nằm trên cùng để bao phủ lên cả nhân vật */
      
      /* Dải sắc phổ gradient cầu vồng */
      background: linear-gradient(
        var(--foil-angle, 115deg),
        rgba(255, 0, 128, 0.15) 0%,
        rgba(0, 242, 254, 0.2) 30%,
        rgba(255, 255, 255, 0.65) 50%,
        rgba(127, 0, 255, 0.2) 70%,
        rgba(255, 0, 128, 0.15) 100%
      );
      background-size: 200% 200%;
      background-position: var(--foil-x, 50%) var(--foil-y, 50%);
      mix-blend-mode: color-dodge; /* Hòa trộn bắt sáng mạnh tại các vùng sáng */
      opacity: 0.85;
      transition: background-position 0.1s ease-out;
    }

    /* Lớp phủ tối nhẹ trung gian giữa Nền và Nhân vật để tăng chiều sâu đồ họa */
    .card-front::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.06);
      z-index: 1;
      border-radius: 20px;
    }

    /* ==========================================================================
       4. CHI TIẾT MẶT SAU (BACK) - GRADIENT ĐỎ ĐEN & VĂN BẢN NỔI
       ========================================================================== */
    .card-back {
      /* Tạo màu nền Gradient Đỏ - Đen huyền bí theo yêu cầu */
      background: linear-gradient(135deg, #260202 0%, #0d0101 50%, #000000 100%);
      transform: rotateY(180deg); /* Lật ngược 180 độ sẵn để úp lại phía sau */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 35px;
      text-align: center;
      color: #f3f4f6;
      border: 2px solid #5c0404; /* Khung viền đỏ sẫm sang trọng bao quanh */
    }

    /* Ánh đèn đỏ hồng lập lòe huyền ảo phát ra lan tỏa từ tâm mặt sau */
    .card-back::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      background: radial-gradient(circle at center, rgba(255, 0, 0, 0.18) 0%, transparent 72%);
      pointer-events: none;
    }

    /* Khung chứa văn bản nội dung - Đẩy nổi khối trên trục Z */
    .card-content {
      z-index: 2;
      transform: translateZ(50px); /* Chữ nổi bật hẳn lên không gian 3D khi nghiêng góc máy */
      transition: transform 0.1s ease-out;
    }

    /* Kiểu dáng Tiêu đề văn bản mặt sau */
    .card-content h2 {
      font-size: 24px;
      color: #ff4b2b;
      margin-bottom: 18px;
      font-weight: 800;
      text-shadow: 0 2px 12px rgba(255, 75, 43, 0.4);
      letter-spacing: 1px;
    }

    /* Kiểu dáng Đoạn văn bản mô tả */
    .card-content p {
      font-size: 15px;
      line-height: 1.65;
      color: #cbd5e1;
      font-weight: 400;
    }
  </style>
</head>
<body>

  <button id="btn-permission">Bật hiệu ứng nghiêng 3D & Phản quang</button>

  <div class="card-container" id="cardContainer">
    
    <div class="card-front">
      <div class="card-character"></div>
      <div class="card-foil" id="cardFoil"></div>
    </div>

    <div class="card-back">
      <div class="card-content">
        <h2>TIÊU ĐỀ MẶT SAU</h2>
        <p>Đây là nội dung văn bản hoàn chỉnh nằm sau mặt thẻ. Khi bấm vào mặt trước, thẻ sẽ kích hoạt hiệu ứng xoay lật 180 độ mượt mà để hiển thị phần thông điệp tri ân này trên nền hiệu ứng màu Gradient Đỏ - Đen.</p>
      </div>
    </div>

  </div>

  <script>
    const cardContainer = document.getElementById('cardContainer');
    const cardFoil = document.getElementById('cardFoil');
    const btnPermission = document.getElementById('btn-permission');
    
    let isFlipped = false; // Biến trạng thái theo dõi thẻ đang lật hay úp

    /**
     * Hàm xử lý tính toán tọa độ ma trận xoay 3D và di chuyển dải quang học
     */
    function updateCardEffects(xDeg, yDeg) {
      // Nếu người dùng đã lật ra mặt sau thì tạm ngưng hiệu ứng nghiêng của mặt trước
      if (isFlipped) return;

      // Áp dụng góc xoay trực tiếp vào thuộc tính CSS transform của khung chứa
      cardContainer.style.transform = `rotateX
